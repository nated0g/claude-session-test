name: Claude Session Artifact

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  upload-session:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch git notes
        run: git fetch origin "refs/notes/claude-sessions:refs/notes/claude-sessions" || echo "No claude-session notes ref found"

      - name: Extract sessions from notes
        id: extract
        run: |
          mkdir -p sessions
          FOUND=false
          for SHA in $(git log --format='%H' origin/${{ github.event.pull_request.base.ref }}..${{ github.event.pull_request.head.sha }}); do
            NOTE=$(git notes --ref=claude-sessions show "$SHA" 2>/dev/null) || continue
            echo "$NOTE" > "sessions/${SHA}.jsonl"
            FOUND=true
          done
          echo "found=$FOUND" >> "$GITHUB_OUTPUT"

      - name: Upload session artifacts
        if: steps.extract.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: claude-sessions
          path: sessions/

      - name: Comment on PR
        if: steps.extract.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const files = fs.readdirSync('sessions');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let body = `### Claude Code Sessions\n\n`;
            body += `Found ${files.length} session(s) attached to commits in this PR.\n\n`;
            for (const f of files) {
              const sha = f.replace('.jsonl', '');
              body += `- \`${sha.slice(0, 8)}\` — session attached\n`;
            }
            body += `\n[Download session artifacts](${runUrl}#artifacts)`;

            // Check for existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('### Claude Code Sessions'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
