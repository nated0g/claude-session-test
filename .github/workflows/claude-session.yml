name: Claude Session Pages

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  publish-session:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch git notes
        run: git fetch origin "refs/notes/claude-sessions:refs/notes/claude-sessions" || echo "No claude-session notes ref found"

      - name: Extract sessions from notes
        id: extract
        run: |
          mkdir -p sessions
          FOUND=false
          for SHA in $(git log --format='%H' origin/${{ github.event.pull_request.base.ref }}..${{ github.event.pull_request.head.sha }}); do
            NOTE_FILE="sessions/${SHA}.jsonl"
            git notes --ref=claude-sessions show "$SHA" > "$NOTE_FILE" 2>/dev/null || { rm -f "$NOTE_FILE"; continue; }

            # Split bundled file into main + subagents
            SESSION_DIR="sessions/${SHA}"
            mkdir -p "${SESSION_DIR}/subagents"

            # Split on ---SUBAGENT:xxx--- markers
            python3 -c "
          import sys, os
          main_file = sys.argv[1]
          session_dir = sys.argv[2]
          with open(main_file) as f:
              content = f.read()
          parts = content.split('===CLAUDE_SUBAGENT_BOUNDARY:')
          # First part is the main session
          with open(main_file, 'w') as f:
              f.write(parts[0].rstrip())
          # Remaining parts are subagents
          for part in parts[1:]:
              agent_id, _, agent_content = part.partition('===\n')
              agent_id = agent_id.strip()
              sa_path = os.path.join(session_dir, 'subagents', f'{agent_id}.jsonl')
              with open(sa_path, 'w') as f:
                  f.write(agent_content.rstrip())
          " "$NOTE_FILE" "$SESSION_DIR"

            FOUND=true
          done
          echo "found=$FOUND" >> "$GITHUB_OUTPUT"

      - name: Render HTML pages
        if: steps.extract.outputs.found == 'true'
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          mkdir -p "deploy/pr/${PR_NUM}"
          for f in sessions/*.jsonl; do
            SHA=$(basename "$f" .jsonl)
            python3 scripts/render-session.py "$f" "$SHA" > "deploy/pr/${PR_NUM}/${SHA}.html"
          done

      - name: Deploy to gh-pages
        if: steps.extract.outputs.found == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git checkout gh-pages
          PR_NUM=${{ github.event.pull_request.number }}
          mkdir -p "pr/${PR_NUM}"
          cp deploy/pr/${PR_NUM}/*.html "pr/${PR_NUM}/"
          git add pr/
          git commit -m "Update session pages for PR #${PR_NUM}" || echo "No changes to commit"
          git push origin gh-pages

      - name: Comment on PR
        if: steps.extract.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prNum = context.issue.number;

            const { data: pages } = await github.rest.repos.getPages({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const baseUrl = pages.html_url.replace(/\/$/, '');

            const files = fs.readdirSync('sessions').filter(f => f.endsWith('.jsonl'));
            let body = `### Claude Code Sessions\n\n`;
            body += `Found ${files.length} session(s) attached to commits in this PR.\n\n`;
            for (const f of files) {
              const sha = f.replace('.jsonl', '');
              const short = sha.slice(0, 8);
              body += `- [\`${short}\` — View Session](${baseUrl}/pr/${prNum}/${sha}.html)\n`;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('### Claude Code Sessions'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
