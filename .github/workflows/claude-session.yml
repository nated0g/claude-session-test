name: Claude Session Pages

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  publish-session:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch git notes
        run: git fetch origin "refs/notes/claude-sessions:refs/notes/claude-sessions" || echo "No claude-session notes ref found"

      - name: Extract sessions from notes
        id: extract
        run: |
          mkdir -p sessions
          FOUND=false
          for SHA in $(git log --format='%H' origin/${{ github.event.pull_request.base.ref }}..${{ github.event.pull_request.head.sha }}); do
            NOTE_FILE="sessions/${SHA}.jsonl"
            git notes --ref=claude-sessions show "$SHA" > "$NOTE_FILE" 2>/dev/null || { rm -f "$NOTE_FILE"; continue; }
            FOUND=true
          done
          echo "found=$FOUND" >> "$GITHUB_OUTPUT"

      - name: Deploy to gh-pages
        if: steps.extract.outputs.found == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          PR_NUM=${{ github.event.pull_request.number }}
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          AUTHOR="${{ github.event.pull_request.user.login || 'unknown' }}"

          # Stash sessions and viewer files outside the working tree
          cp -r sessions /tmp/sessions
          cp index.html /tmp/index.html
          cp -r assets /tmp/assets

          # Build index.json manifest
          MANIFEST="["
          FIRST=true
          for f in sessions/*.jsonl; do
            SESSION_SHA=$(basename "$f" .jsonl)
            TIMESTAMP=$(git log -1 --format='%aI' "$SESSION_SHA" 2>/dev/null || echo "")
            if [ "$FIRST" = true ]; then FIRST=false; else MANIFEST+=","; fi
            MANIFEST+="{\"sha\":\"${SESSION_SHA}\",\"author\":\"${AUTHOR}\",\"timestamp\":\"${TIMESTAMP}\"}"
          done
          MANIFEST+="]"

          git fetch origin gh-pages || git checkout --orphan gh-pages
          git checkout gh-pages || git checkout --orphan gh-pages

          # Copy viewer app files
          cp /tmp/index.html index.html
          rm -rf assets
          cp -r /tmp/assets assets

          # Copy JSONL data files
          mkdir -p "data/pr/${PR_NUM}"
          cp /tmp/sessions/*.jsonl "data/pr/${PR_NUM}/"

          # Write manifest
          echo "$MANIFEST" > "data/pr/${PR_NUM}/index.json"

          git add index.html assets/ data/
          git commit -m "Update session pages for PR #${PR_NUM}" || echo "No changes to commit"
          git push origin gh-pages

      - name: Comment on PR
        if: steps.extract.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prNum = context.issue.number;

            const { data: pages } = await github.rest.repos.getPages({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const baseUrl = pages.html_url.replace(/\/$/, '');
            const repoUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}`;

            const files = fs.readdirSync('sessions').filter(f => f.endsWith('.jsonl'));
            let body = `### Claude Code Sessions\n\n`;
            body += `Found ${files.length} session(s) attached to commits in this PR.\n\n`;
            for (const f of files) {
              const sha = f.replace('.jsonl', '');
              const short = sha.slice(0, 8);
              body += `- [\`${short}\` — View Session](${baseUrl}/?pr=${prNum}&sha=${sha}&repo=${encodeURIComponent(repoUrl)})\n`;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('### Claude Code Sessions'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
